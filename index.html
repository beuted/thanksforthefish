        }
        30% {
          transform: translateX(3px) rotate(1deg);
        }
        45% {
          transform: translateX(-2px) rotate(0);
        }
        60% {

        }
        75% {

        ];

        var phraseIndex = 0;
        function getNextPhrase() {
          var text = atob(phrases[phraseIndex]);
          phraseIndex = (phraseIndex + 1) % phrases.length;
          return text;
        }

        function getFrenchVoice() {
          var voices = speechSynthesis.getVoices();
          var fr = voices.filter(function (v) {
            return v.lang.startsWith("fr");
          });
          return fr[0] || voices[0];
        }

        document.getElementById("crto").addEventListener("click", function () {
          var u = new SpeechSynthesisUtterance(getNextPhrase());
          u.lang = "fr-FR";
          u.voice = getFrenchVoice();
          speechSynthesis.speak(u);
        });

        speechSynthesis.onvoiceschanged = function () {
          getFrenchVoice();
        };
      })();

    <script>
      (function () {
        var PBKDF2_ITERATIONS = 210000;

        function randomBytes(n) {
          var a = new Uint8Array(n);
          crypto.getRandomValues(a);
          return a;
        }

        function bytesToBase64(bytes) {
          var bin = "";
          for (var i = 0; i < bytes.length; i++) {
            bin += String.fromCharCode(bytes[i]);
          }
          return btoa(bin);
        }

        function base64ToBytes(b64) {
          var bin = atob(b64);
          var out = new Uint8Array(bin.length);
          for (var i = 0; i < bin.length; i++) {
            out[i] = bin.charCodeAt(i);
          }
          return out;
        }

        /** AES-256-GCM + PBKDF2-SHA256. Returns a single Base64 string (JSON payload inside). */
        function xorEncryptToBase64(plainText, password) {
          var enc = new TextEncoder();
          var salt = randomBytes(16);
          var iv = randomBytes(12);
          return crypto.subtle
            .importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"])
            .then(function (keyMaterial) {
              return crypto.subtle.deriveKey(
                {
                  name: "PBKDF2",
                  salt: salt,
                  iterations: PBKDF2_ITERATIONS,
                  hash: "SHA-256",
                },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt"],
              );
            })
            .then(function (key) {
              return crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(plainText));
            })
            .then(function (ciphertext) {
              var payload = {
                v: 1,
                i: PBKDF2_ITERATIONS,
                s: bytesToBase64(salt),
                iv: bytesToBase64(iv),
                d: bytesToBase64(new Uint8Array(ciphertext)),
              };
              return btoa(JSON.stringify(payload));
            });
        }

        function xorDecryptFromBase64(wrappedB64, password) {
          var enc = new TextEncoder();
          var dec = new TextDecoder();
          var payload = JSON.parse(atob(wrappedB64));
          if (payload.v !== 1) {
            return Promise.reject(new Error("unknown payload version"));
          }
          var iterations = payload.i != null ? payload.i : PBKDF2_ITERATIONS;
          var salt = base64ToBytes(payload.s);
          var iv = base64ToBytes(payload.iv);
          var data = base64ToBytes(payload.d);
          return crypto.subtle
            .importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"])
            .then(function (keyMaterial) {
              return crypto.subtle.deriveKey(
                {
                  name: "PBKDF2",
                  salt: salt,
                  iterations: iterations,
                  hash: "SHA-256",
                },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["decrypt"],
              );
            })
            .then(function (key) {
              return crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
            })
            .then(function (buf) {
              return dec.decode(buf);
            });
        }

        var secret;
        var lastKeys = [];
        var maxKeys = 50;
        ///////////////////////////////////////////////////////////////////
        // 1. 🔊 #10
        // 2. flag.png
        // 3. 1. e4 h6 2. e5 d5 3. exd6
        // 4. geogsr.png
        // 5. c3b091eec8c673830f90f0264af5f4e0a0807914 nom
        //
        // 🔑 = "1" + "2" + "3" + "4"
        // (FR)
        ///////////////////////////////////////////////////////////////////

        secret = "eyJ2IjoxLCJpIjoyMTAwMDAsInMiOiJvVmtkV1IvU3UvMklCOHBZa245Qk9BPT0iLCJpdiI6IktNUmNGZjV1QVN0eG5oWFEiLCJkIjoiUkV3VjdwdHZaaWtVU2x5SUJ5RVptYXZaNmJiL1pRTEhwV1JDS3BEcjNpNnVQTTFPdjdWb1hUMzJXUTFVUXRsc0ZXbW4wUEcya2JVSDVWc1dPeDh6WXNJM3AwRT0ifQ==";

        console.log("Appuyez sur une touche quelconque pour continuer");
        document.addEventListener("keydown", function (e) {
          if (e.key === " " || e.key === "Enter" || e.key.length !== 1) return;
          lastKeys.push(e.key.toLowerCase());
          if (lastKeys.length > maxKeys) {
            lastKeys.shift();
          }
          var pwd = lastKeys.slice().join("");
          xorDecryptFromBase64(secret, pwd).then(
            function (plain) {
              console.log(pwd, "=>", plain);
            },
            function () {
              console.log(pwd, "=>", "(decrypt failed)");
            },
          );
        });
      })();
    </script>
